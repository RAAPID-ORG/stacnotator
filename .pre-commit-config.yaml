repos:
  # Backend (Python) hooks
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: [--fix]
        files: ^stacnotator/backend/.*\.py$
      - id: ruff-format
        files: ^stacnotator/backend/.*\.py$

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        files: ^stacnotator/backend/|^stacnotator/frontend/
      - id: end-of-file-fixer
        files: ^stacnotator/backend/|^stacnotator/frontend/
      - id: check-yaml
        files: ^stacnotator/backend/|^stacnotator/frontend/
      - id: check-added-large-files
        files: ^stacnotator/backend/|^stacnotator/frontend/
      - id: detect-private-key
        files: ^stacnotator/backend/|^stacnotator/frontend/

  # Security and secrets/leak detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        files: ^stacnotator/

  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.18.1
    hooks:
      - id: gitleaks
        files: ^stacnotator/

  - repo: https://github.com/PyCQA/bandit
    rev: v1.7.8
    hooks:
      - id: bandit
        name: bandit (security linter)
        entry: bandit -r stacnotator/backend/src
        language: system
        types: [python]
        files: ^stacnotator/backend/.*\.py$

  # Frontend (JS/TS/React) hooks
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.7.0
    hooks:
      - id: prettier
        files: ^stacnotator/frontend/app/.*\.(js|jsx|ts|tsx|css|md)$

  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v8.56.0
    hooks:
      - id: eslint
        files: ^stacnotator/frontend/app/.*\.(js|jsx|ts|tsx)$
