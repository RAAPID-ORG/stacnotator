  <ellipse cx="16" cy="16" rx="5" ry="9" fill="none" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="7" y1="16" x2="25" y2="16" stroke="white" stroke-width="1" opacity="0.6"/>
  <!-- Annotation marker / crosshair -->
