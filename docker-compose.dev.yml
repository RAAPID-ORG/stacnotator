# Development Docker Compose Configuration (Standalone)
# Usage: docker-compose -f docker-compose.dev.yml up

services:
  # PostgreSQL Database with PostGIS + pgvector
  db:
    build:
      context: ./db
    image: stacnotator-db:dev
    container_name: stacnotator-db-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stacnotator}
      POSTGRES_USER: ${POSTGRES_USER:-stacnotator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stacnotator} -d ${POSTGRES_DB:-stacnotator}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stacnotator-dev-network

  # Backend API (Development with hot reload)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: backend-dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DBNAME: ${POSTGRES_DB:-stacnotator}
      DBUSER: ${POSTGRES_USER:-stacnotator}
      DBPASS: ${POSTGRES_PASSWORD:-devpassword}
      DBHOST: db
      DBPORT: 5432
      DBDRIVER: psycopg2
      DBSCHEME: postgresql
      AUTH_PROVIDER: ${AUTH_PROVIDER:-firebase}
      FIREBASE_CREDENTIALS_PATH: /app/config/firebase-credentials.json
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:8080}
      EE_SERVICE_ACCOUNT: ${EE_SERVICE_ACCOUNT:-}
      EE_PRIVATE_KEY_PATH: /app/config/ee-private-key.json
      TILER_TOKEN_SECRET: ${TILER_TOKEN_SECRET:-dev-tiler-secret-change-in-production}
      ENVIRONMENT: development
      LOG_LEVEL: debug
      TILER_BASE_URL: ${TILER_BASE_URL:-http://tiler:8001}
    volumes:
      # Mount source code for hot reloading
      - ./backend/src:/app/src:ro
      - ./backend/alembic:/app/alembic  # Writable for creating migrations
      - ./backend/alembic.ini:/app/alembic.ini:ro
      - ./backend/logging.ini:/app/logging.ini:ro
      - ./backend/seed_dev_data.py:/app/seed_dev_data.py:ro
      - ./backend/logs:/app/logs
      # Tests (mounted so pytest runs inside the container)
      - ./backend/tests:/app/tests:ro
      - ./backend/pyproject.toml:/app/pyproject.toml:ro
      # Mount credential files
      - ${FIREBASE_CREDENTIALS_PATH_HOST:-./backend/config/firebase-credentials.json}:/app/config/firebase-credentials.json:ro
      - ${EE_PRIVATE_KEY_PATH_HOST:-./backend/config/ee-private-key.json}:/app/config/ee-private-key.json:ro
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - stacnotator-dev-network
    # Override command for development with hot reload
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug

  # Tiler Service (tile serving, separated from backend for independent scaling)
  tiler:
    build:
      context: ./tiler
      dockerfile: Dockerfile.dev
    container_name: tiler-dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DBNAME: ${POSTGRES_DB:-stacnotator}
      DBUSER: ${POSTGRES_USER:-stacnotator}
      DBPASS: ${POSTGRES_PASSWORD:-devpassword}
      DBHOST: db
      DBPORT: 5432
      DBDRIVER: psycopg2
      DBSCHEME: postgresql
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:8080}
      TILER_TOKEN_SECRET: ${TILER_TOKEN_SECRET:-dev-tiler-secret-change-in-production}
      GDAL_DISABLE_READDIR_ON_OPEN: EMPTY_DIR
      GDAL_HTTP_MERGE_CONSECUTIVE_RANGES: "NO"
      GDAL_HTTP_MULTIPLEX: "YES"
      GDAL_HTTP_TIMEOUT: "60"
      GDAL_HTTP_MAX_RETRY: "3"
      GDAL_HTTP_RETRY_DELAY: "1"
      GDAL_CACHEMAX: "256"
      VSI_CACHE: "TRUE"
      VSI_CACHE_SIZE: "536870912"
      CPL_VSIL_CURL_ALLOWED_EXTENSIONS: ".tif,.tiff"
      CPL_VSIL_CURL_CACHE_SIZE: "128000000"
    volumes:
      - ./tiler/src:/app/src:ro
      - ./tiler/pyproject.toml:/app/pyproject.toml:ro
    ports:
      - "${TILER_PORT:-8001}:8001"
    networks:
      - stacnotator-dev-network
    command: uvicorn src.main:app --host 0.0.0.0 --port 8001 --reload --log-level debug

  # Frontend (Development with Vite HMR)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
        VITE_TILER_BASE_URL: ${VITE_TILER_BASE_URL:-http://localhost:8001}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
    container_name: frontend-dev
    restart: unless-stopped
    depends_on:
      - backend
      - tiler
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_TILER_BASE_URL: ${VITE_TILER_BASE_URL:-http://localhost:8001}
      VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
      VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
      VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
      - ./frontend/tsconfig.json:/app/tsconfig.json:ro
      - ./frontend/package.json:/app/package.json
      - ./frontend/package-lock.json:/app/package-lock.json
      # E2E test files - mounted so tests run without rebuilding the image
      - ./frontend/e2e:/app/e2e:ro
      - ./frontend/playwright.config.ts:/app/playwright.config.ts:ro
      # Named volume for node_modules -persists installed packages across restarts
      # To install new packages: make dev-frontend-npm PKG="package-name"
      # To fully reset:          make dev-rebuild-frontend
      - frontend_node_modules_dev:/app/node_modules
    ports:
      - "5173:5173"
    networks:
      - stacnotator-dev-network

volumes:
  postgres_data_dev:
    driver: local
  frontend_node_modules_dev:
    driver: local

networks:
  stacnotator-dev-network:
    driver: bridge
