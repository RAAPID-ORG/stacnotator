# Production Docker Compose Configuration
# Usage: docker-compose -f docker-compose.prod.yml up

services:
  # PostgreSQL Database with PostGIS
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: stacnotator-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stacnotator}
      POSTGRES_USER: ${POSTGRES_USER:-stacnotator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Database password required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stacnotator} -d ${POSTGRES_DB:-stacnotator}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - stacnotator-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DBNAME: ${POSTGRES_DB:-stacnotator}
      DBUSER: ${POSTGRES_USER:-stacnotator}
      DBPASS: ${POSTGRES_PASSWORD:?Database password required}
      DBHOST: db
      DBPORT: 5432
      DBDRIVER: psycopg2
      DBSCHEME: postgresql
      AUTH_PROVIDER: ${AUTH_PROVIDER:-firebase}
      FIREBASE_CREDENTIALS_PATH: /app/config/firebase-credentials.json
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:8080}
      EE_SERVICE_ACCOUNT: ${EE_SERVICE_ACCOUNT:-}
      EE_PRIVATE_KEY_PATH: /app/config/ee-private-key.json
      # Gunicorn settings
      WORKERS: ${WORKERS:-4}
      TIMEOUT: ${TIMEOUT:-60}
      GRACEFUL_TIMEOUT: ${GRACEFUL_TIMEOUT:-30}
      KEEPALIVE: ${KEEPALIVE:-5}
      MAX_REQUESTS: ${MAX_REQUESTS:-1000}
      MAX_REQUESTS_JITTER: ${MAX_REQUESTS_JITTER:-50}
    volumes:
      - ./backend/logs:/app/logs
      # Mount credential files from host paths defined in .env
      - ${FIREBASE_CREDENTIALS_PATH_HOST}:/app/config/firebase-credentials.json:ro
      - ${EE_PRIVATE_KEY_PATH_HOST}:/app/config/ee-private-key.json:ro
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    networks:
      - stacnotator-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # In prod, API is served via nginx on the same origin — SDK paths already include /api
        VITE_API_BASE_URL: ${VITE_API_BASE_URL_PROD:-}
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
    container_name: frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - stacnotator-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: stacnotator-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    networks:
      - stacnotator-network

volumes:
  postgres_data:
    driver: local

networks:
  stacnotator-network:
    driver: bridge
