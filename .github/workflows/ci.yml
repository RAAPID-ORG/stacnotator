name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  # Secret scanning  (all branches)
  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # Backend: lint + type-check  (all branches)
  backend-lint:
    name: "Backend: Lint & Type Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check src/

      - name: Ruff format check
        run: uv run ruff format --check src/

  # Frontend: lint + type-check  (all branches)
  frontend-lint:
    name: "Frontend: Lint & Type Check"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint src/

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Prettier format check
        run: npx prettier --check "src/**/*.{ts,tsx,css}"

  # Backend: tests in Docker  (develop + main)
  backend-test:
    name: "Backend: Tests (Docker)"
    needs: [backend-lint]
    if: >-
      github.ref == 'refs/heads/develop' ||
      github.ref == 'refs/heads/main' ||
      github.base_ref == 'develop' ||
      github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and start db + backend
        run: docker compose -f docker-compose.dev.yml up -d db backend
        env:
          POSTGRES_DB: stacnotator_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          AUTH_PROVIDER: firebase

      - name: Wait for database to be healthy
        run: |
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.dev.yml exec -T db pg_isready -U test -d stacnotator_test; then
              echo "Database is ready"
              break
            fi
            echo "Waiting for database... ($i/30)"
            sleep 2
          done

      - name: Run pytest
        run: docker compose -f docker-compose.dev.yml exec -T -e ENVIRONMENT=testing backend python -m pytest tests/ -v --tb=short

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.dev.yml down -v

  # Frontend: Playwright E2E in Docker  (develop + main)
  # frontend-e2e:
  #   name: "Frontend: Playwright E2E (Docker)"
  #   needs: [frontend-lint]
  #   if: >-
  #     github.ref == 'refs/heads/develop' ||
  #     github.ref == 'refs/heads/main' ||
  #     github.base_ref == 'develop' ||
  #     github.base_ref == 'main'
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4

  #     - name: Build and start frontend
  #       run: docker compose -f docker-compose.dev.yml up -d frontend
  #       env:
  #         VITE_API_BASE_URL: http://localhost:8000

  #     - name: Wait for Vite dev server
  #       run: |
  #         for i in $(seq 1 30); do
  #           if curl -s http://localhost:5173 > /dev/null 2>&1; then
  #             echo "Frontend is ready"
  #             break
  #           fi
  #           echo "Waiting for frontend... ($i/30)"
  #           sleep 2
  #         done

  #     - name: Run Playwright tests
  #       run: docker compose -f docker-compose.dev.yml exec -T -e CI=true frontend npx playwright test

  #     - name: Copy test results from container
  #       if: ${{ !cancelled() }}
  #       run: docker cp frontend-dev:/app/test-results ./frontend/test-results 2>/dev/null || true

  #     - name: Upload test results
  #       if: ${{ !cancelled() }}
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: playwright-report
  #         path: frontend/test-results/
  #         retention-days: 7

  #     - name: Tear down
  #       if: always()
  #       run: docker compose -f docker-compose.dev.yml down -v

  # Docker build verification production images  (main only) - Will want to do staging tests here later
  docker-build:
    name: "Docker: Production Build"
    needs: [backend-lint, frontend-lint]
    if: github.ref == 'refs/heads/main' || github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t stacnotator-backend:ci ./backend

      - name: Build tiler image
        run: docker build -t stacnotator-tiler:ci ./tiler

      - name: Build frontend image
        run: docker build -t stacnotator-frontend:ci ./frontend

  # Deploy to Azure production  (main only, push events only)
  deploy-prod:
    name: "Deploy: Azure Production"
    needs: [backend-test, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux, x64, azure]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Azure Login via OIDC (prod identity)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID_PROD }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Deploy to Azure
        env:
          CI: "true"
          RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP_PROD }}
          EE_SERVICE_ACCOUNT: ${{ vars.EE_SERVICE_ACCOUNT_PROD }}
          CUSTOM_DOMAINS: ${{ vars.CUSTOM_DOMAINS_PROD }}
        run: ./azure_deploy/deploy-app.sh prod
